type: masonry
path: office
title: Office
icon: mdi:desk
cards:
  - type: custom:mushroom-chips-card
    chips:
      - type: back
  - type: horizontal-stack
    cards:
      - type: custom:mini-graph-card
        name: Humidity
        entities:
          - entity: sensor.office_temperature_temperature
            name: Humidity
        show:
          fill: true
        hours_to_show: 12
        points_per_hour: 2
      - type: custom:mini-graph-card
        name: Temperature
        entities:
          - entity: sensor.office_temperature_humidity
            name: Temperature
        show:
          fill: true
        hours_to_show: 12
        points_per_hour: 2
        line_color: blue
  - type: thermostat
    entity: climate.office_radiator
  - type: horizontal-stack
    cards:
      - show_name: true
        show_icon: true
        type: button
        entity: switch.office_switch_pc
        name: PC
        show_state: false
        tap_action:
          action: none
      - show_name: true
        show_icon: true
        type: button
        entity: switch.office_switch_desk
        name: Desk
        tap_action:
          action: none
      - show_name: true
        show_icon: true
        type: button
        entity: switch.office_switch_speakers
        name: Speakers

subview: true